name: Tests
on:
  push:
    branches: ["**"]
    tags-ignore: ["v*"]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install
      - run: bun test
      - run: bunx tsc --noEmit

  # Validate the macOS Vision OCR helper compiles, and publish the universal
  # Mach-O binary as an artifact so operators can grab it without cutting a
  # release tag. The artifact is attached to every run and can also be built
  # on demand via the Actions "Run workflow" button (workflow_dispatch).
  ocr-helper:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v5

      - name: Build universal ocr-helper
        working-directory: sidecar
        run: |
          set -euo pipefail
          swiftc -O -target arm64-apple-macos11  -o /tmp/ocr-helper-arm64 helpers/ocr-helper.swift
          swiftc -O -target x86_64-apple-macos11 -o /tmp/ocr-helper-amd64 helpers/ocr-helper.swift
          mkdir -p helpers
          lipo -create -output helpers/ocr-helper /tmp/ocr-helper-arm64 /tmp/ocr-helper-amd64
          file helpers/ocr-helper
          lipo -info helpers/ocr-helper

      - name: Upload helper binary
        uses: actions/upload-artifact@v5
        with:
          name: ocr-helper-darwin
          path: sidecar/helpers/ocr-helper
