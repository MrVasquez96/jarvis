services:
  jarvis:
    image: ghcr.io/vierisid/jarvis:latest
    build:
      context: .
      dockerfile: Dockerfile
    container_name: jarvis
    restart: unless-stopped
    privileged: true
    network_mode: host
    pid: host
    ipc: host
    ports:
      - "3142:3142"
    volumes:
      - jarvis-data:/data
      # Mount a custom config if you have one:
      - ./config.yaml:/data/config.yaml:ro
    environment:
      - JARVIS_API_KEY=${JARVIS_API_KEY}
      # - JARVIS_AUTH_TOKEN=${JARVIS_AUTH_TOKEN}
      # - OPENAI_API_KEY=${OPENAI_API_KEY}

volumes:
  jarvis-data:
